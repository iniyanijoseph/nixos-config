font: "JetBrainsMono Nerd Font 12"
background: "#282828e0"
color: "#ebdbb2"
border: "#98971a"
separator: "  "
border_width: 2
corner_r: 4
padding: 16
anchor: center
auto_kbd_layout: true
inhibit_compositor_keyboard_shortcuts: true

menu:
  - key: "o"
    desc: "  open"
    submenu:
      - key: "t"
        desc: "  terminal"
        cmd: kitty
      - key: "b"
        desc: "  browser"
        cmd: firefox
      - key: "m"
        desc: "  mail"
        cmd: thunderbird
      - key: "f"
        desc: "  files"
        cmd: kitty yazi
      - key: "d"
        desc: "  displays"
        cmd: nwg-displays
      - key: "v"
        desc: "  volume"
        cmd: pavucontrol
      - key: "n"
        desc: "  network"
        cmd: nm-connection-editor
      - key: "B"
        desc: "  bluetooth"
        cmd: blueman-manager

  - key: "w"
    desc: "  window"
    submenu:
      - key: "q"
        desc: "  close"
        cmd: hyprctl dispatch killactive
      - key: "f"
        desc: "  fullscreen"
        cmd: hyprctl dispatch fullscreen 0
      - key: "m"
        desc: "  maximize"
        cmd: hyprctl dispatch fullscreen 1
      - key: "t"
        desc: "  float"
        cmd: hyprctl dispatch togglefloating
      - key: "c"
        desc: "  move to empty"
        cmd: hyprctl dispatch movetoworkspace empty

  - key: "f"
    desc: "  focus"
    submenu:
      - key: "h"
        desc: "  right"
        cmd: hyprctl dispatch movefocus r
        keep_open: true
      - key: "l"
        desc: "  left"
        cmd: hyprctl dispatch movefocus l
        keep_open: true
      - key: "k"
        desc: "  up"
        cmd: hyprctl dispatch movefocus u
        keep_open: true
      - key: "j"
        desc: "  down"
        cmd: hyprctl dispatch movefocus d
        keep_open: true

  - key: "m"
    desc: "  move window"
    submenu:
      - key: "h"
        desc: "  right"
        cmd: hyprctl dispatch movewindow r
        keep_open: true
      - key: "l"
        desc: "  left"
        cmd: hyprctl dispatch movewindow l
        keep_open: true
      - key: "k"
        desc: "  up"
        cmd: hyprctl dispatch movewindow u
        keep_open: true
      - key: "j"
        desc: "  down"
        cmd: hyprctl dispatch movewindow d
        keep_open: true

  - key: "M"
    desc: "  move (pixel)"
    submenu:
      - key: "h"
        desc: "  right"
        cmd: hyprctl dispatch moveactive 80 0
        keep_open: true
      - key: "l"
        desc: "  left"
        cmd: hyprctl dispatch moveactive -80 0
        keep_open: true
      - key: "k"
        desc: "  up"
        cmd: hyprctl dispatch moveactive 0 -80
        keep_open: true
      - key: "j"
        desc: "  down"
        cmd: hyprctl dispatch moveactive 0 80
        keep_open: true

  - key: "r"
    desc: "  resize"
    submenu:
      - key: "h"
        desc: "  right +"
        cmd: hyprctl dispatch resizeactive 80 0
        keep_open: true
      - key: "l"
        desc: "  left +"
        cmd: hyprctl dispatch resizeactive -80 0
        keep_open: true
      - key: "k"
        desc: "  up"
        cmd: hyprctl dispatch resizeactive 0 -80
        keep_open: true
      - key: "j"
        desc: "  down"
        cmd: hyprctl dispatch resizeactive 0 80
        keep_open: true

  - key: "W"
    desc: "  workspace"
    submenu:
      - key: "1"
        desc: "  go to 1"
        cmd: hyprctl dispatch workspace 1
      - key: "2"
        desc: "  go to 2"
        cmd: hyprctl dispatch workspace 2
      - key: "3"
        desc: "  go to 3"
        cmd: hyprctl dispatch workspace 3
      - key: "4"
        desc: "  go to 4"
        cmd: hyprctl dispatch workspace 4
      - key: "5"
        desc: "  go to 5"
        cmd: hyprctl dispatch workspace 5
      - key: "6"
        desc: "  go to 6"
        cmd: hyprctl dispatch workspace 6
      - key: "7"
        desc: "  go to 7"
        cmd: hyprctl dispatch workspace 7
      - key: "8"
        desc: "  go to 8"
        cmd: hyprctl dispatch workspace 8
      - key: "9"
        desc: "  go to 9"
        cmd: hyprctl dispatch workspace 9
      - key: "m"
        desc: "  move window to"
        submenu:
          - key: "1"
            desc: "  ws 1"
            cmd: hyprctl dispatch movetoworkspacesilent 1
          - key: "2"
            desc: "  ws 2"
            cmd: hyprctl dispatch movetoworkspacesilent 2
          - key: "3"
            desc: "  ws 3"
            cmd: hyprctl dispatch movetoworkspacesilent 3
          - key: "4"
            desc: "  ws 4"
            cmd: hyprctl dispatch movetoworkspacesilent 4
          - key: "5"
            desc: "  ws 5"
            cmd: hyprctl dispatch movetoworkspacesilent 5
          - key: "6"
            desc: "  ws 6"
            cmd: hyprctl dispatch movetoworkspacesilent 6
          - key: "7"
            desc: "  ws 7"
            cmd: hyprctl dispatch movetoworkspacesilent 7
          - key: "8"
            desc: "  ws 8"
            cmd: hyprctl dispatch movetoworkspacesilent 8
          - key: "9"
            desc: "  ws 9"
            cmd: hyprctl dispatch movetoworkspacesilent 9

  - key: "v"
    desc: "  volume"
    submenu:
      - key: "k"
        desc: "  up +2"
        cmd: pamixer -i 2
        keep_open: true
      - key: "j"
        desc: "  down -2"
        cmd: pamixer -d 2
        keep_open: true
      - key: "m"
        desc: "  mute"
        cmd: pamixer -t
      - key: "p"
        desc: "  pavucontrol"
        cmd: pavucontrol

  - key: "b"
    desc: "  brightness"
    submenu:
      - key: "k"
        desc: "  up +5"
        cmd: brightnessctl set 5%+
        keep_open: true
      - key: "j"
        desc: "  down -5"
        cmd: brightnessctl set 5%-
        keep_open: true

  - key: "s"
    desc: "  screenshot"
    submenu:
      - key: "s"
        desc: "  area → clip"
        cmd: grimblast --freeze copy area
      - key: "S"
        desc: "  full → clip"
        cmd: grimblast copy screen
      - key: "f"
        desc: "  full → file"
        cmd: grimblast save screen

  - key: "n"
    desc: "  notifications"
    cmd: swaync-client -t -s

  - key: "c"
    desc: "  clipboard"
    cmd: "cliphist list | rofi -dmenu -theme-str 'window {width: 50%;} listview {columns: 1;}' | cliphist decode | wl-copy"

  - key: "q"
    desc: "  session"
    submenu:
      - key: "l"
        desc: "  lock"
        cmd: swaylock
      - key: "e"
        desc: "  exit"
        cmd: hyprctl dispatch exit
      - key: "r"
        desc: "  reboot"
        cmd: systemctl reboot
      - key: "p"
        desc: "  poweroff"
        cmd: systemctl poweroff
